<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hungary 2026 – Constituency Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8FAFC; color: #1E293B; }
.container { max-width: 960px; margin: 0 auto; padding: 16px 16px 24px; }

/* Header */
.header { margin-bottom: 12px; }
h1 { font-size: 20px; font-weight: 700; color: #0F172A; letter-spacing: -0.3px; }
.subtitle { font-size: 13px; color: #64748B; margin-top: 2px; }
.last-updated {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; color: #94A3B8; margin-top: 6px;
  padding: 3px 8px; background: #F1F5F9; border-radius: 4px;
}
.last-updated::before {
  content: ''; display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: #94A3B8;
}
.last-updated.live::before { background: #22C55E; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Map */
#map-container {
  position: relative; width: 100%; overflow: hidden;
  background: #fff; border-radius: 8px; border: 1px solid #E2E8F0;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
  touch-action: none; /* enable custom touch handling */
}
svg { width: 100%; height: auto; display: block; cursor: grab; }
svg:active { cursor: grabbing; }
.district { stroke-width: 0.3; cursor: pointer; transition: opacity .2s ease; stroke-linejoin: round; }
.district:hover { opacity: 0.7; }
.border-line { fill: none; stroke: rgba(255,255,255,0.7); stroke-width: 0.5; pointer-events: none; stroke-linejoin: round; }
.district-label {
  font-family: 'Inter', sans-serif; font-size: 5.5px; fill: #fff;
  text-anchor: middle; pointer-events: none; font-weight: 600;
  paint-order: stroke; stroke: rgba(0,0,0,0.25); stroke-width: 0.4px;
}
.district-label.dark { fill: #94A3B8; stroke: none; }

/* Logo overlay */
.map-logo {
  position: absolute; top: 8px; left: 8px; z-index: 4;
  opacity: 0.85; pointer-events: none;
}
.map-logo img { height: 28px; width: auto; }

/* Footer */
.footer {
  margin-top: 8px; font-size: 11px; color: #94A3B8; text-align: center;
}

/* Zoom controls */
.zoom-controls {
  position: absolute; bottom: 12px; right: 12px; display: flex; flex-direction: column; gap: 4px; z-index: 5;
}
.zoom-btn {
  width: 32px; height: 32px; border: 1px solid #E2E8F0; border-radius: 6px;
  background: #fff; color: #475569; font-size: 16px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 1px 3px rgba(0,0,0,.1); transition: background .15s, color .15s;
  line-height: 1; user-select: none;
}
.zoom-btn:hover { background: #F1F5F9; color: #0F172A; }
.zoom-btn:active { background: #E2E8F0; }
.zoom-btn.reset { font-size: 11px; font-weight: 500; }
.zoom-level {
  font-size: 10px; color: #94A3B8; text-align: center; padding: 2px 0;
  font-variant-numeric: tabular-nums; user-select: none;
}

/* Tooltip */
#tooltip {
  display: none; position: absolute; background: #fff; border: 1px solid #E2E8F0;
  border-radius: 8px; padding: 10px 14px; font-size: 12px; pointer-events: none;
  box-shadow: 0 4px 12px rgba(0,0,0,.12); z-index: 10; min-width: 200px; max-width: 280px;
}
#tooltip h3 { font-size: 13px; font-weight: 600; color: #0F172A; margin-bottom: 6px; }
#tooltip .counted { font-size: 11px; color: #64748B; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid #F1F5F9; }
#tooltip .party-row { display: flex; align-items: center; justify-content: space-between; padding: 2px 0; }
#tooltip .party-name { font-weight: 500; }
#tooltip .party-pct { color: #64748B; font-variant-numeric: tabular-nums; }
#tooltip .no-data { color: #94A3B8; font-style: italic; }

/* Seat count */
.seat-count {
  margin-top: 10px; padding: 10px 14px; font-size: 13px;
  background: #fff; border-radius: 8px; border: 1px solid #E2E8F0;
  display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
}
.seat-count .label { font-weight: 600; color: #475569; }
.seat-count .party-seats { font-weight: 600; font-variant-numeric: tabular-nums; }
.seat-count .total { color: #94A3B8; font-size: 12px; }

/* Legend */
.legend {
  display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px;
  font-size: 12px; color: #475569; align-items: center;
}
.legend-item { display: flex; align-items: center; gap: 5px; cursor: default; }
.legend-swatch { width: 12px; height: 12px; border-radius: 3px; }

@media (prefers-reduced-motion: reduce) {
  .district { transition: none; }
  @keyframes pulse { 0%, 100% { opacity: 1; } }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Constituency Results – Hungary 2026</h1>
    <div class="subtitle">106 single-member constituencies (OEVK)</div>
    <div class="last-updated" id="lastUpdated">Last updated: –</div>
  </div>
  <div id="map-container">
    <svg id="map"></svg>
    <div class="map-logo"><img src="logo.png" alt="Europe Elects"></div>
    <div id="tooltip"></div>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoomIn" title="Zoom in">+</button>
      <div class="zoom-level" id="zoomLevel">1x</div>
      <button class="zoom-btn" id="zoomOut" title="Zoom out">&minus;</button>
      <button class="zoom-btn reset" id="zoomReset" title="Reset view">&#8634;</button>
    </div>
  </div>
  <div class="seat-count" id="seatCount"></div>
  <div class="legend" id="legend"></div>
  <div class="footer">Map created by Andrei Miclea and the EuropeElects team</div>
</div>

<script src="map-data.js"></script>
<script>
const PARTIES = {
  'FIDESZ-KDNP': { color: '#000000', name: 'FIDESZ-KDNP (PfE)' },
  'TISZA':       { color: '#3399FF', name: 'TISZA (EPP)' },
  'DK':          { color: '#FF0000', name: 'DK (S&D)' },
  'Mi Hazánk':   { color: '#70463A', name: 'Mi Hazánk (ESN)' },
  'MKKP':        { color: '#009900', name: 'MKKP (→Greens/EFA)' },
  'Egyéb':       { color: '#9CA3AF', name: 'Other' }
};
const NO_DATA_COLOR = '#E2E8F0';

const COUNTY_GROUPS = {};
MAP_DATA.forEach(d => {
  if (!COUNTY_GROUPS[d.county]) COUNTY_GROUPS[d.county] = [];
  COUNTY_GROUPS[d.county].push(d);
});

function buildMap(results) {
  const svg = document.getElementById('map');
  const ns = 'http://www.w3.org/2000/svg';
  svg.setAttribute('viewBox', `0 0 ${SVG_WIDTH} ${SVG_HEIGHT}`);
  svg.innerHTML = '';

  const seatCounts = {};
  const districtColors = {};

  MAP_DATA.forEach(d => {
    let fillColor = NO_DATA_COLOR;
    let winnerParty = null;
    const cResult = results[d.id];
    if (cResult) {
      let maxVote = 0;
      for (const [party, pct] of Object.entries(cResult)) {
        if (party === 'counted' || party === 'turnout') continue;
        if (pct > maxVote) { maxVote = pct; winnerParty = party; }
      }
      if (winnerParty && PARTIES[winnerParty]) {
        fillColor = PARTIES[winnerParty].color;
        seatCounts[winnerParty] = (seatCounts[winnerParty] || 0) + 1;
      }
    }
    districtColors[d.id] = fillColor;

    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', d.d);
    path.setAttribute('class', 'district');
    path.setAttribute('data-id', d.id);
    path.setAttribute('fill', fillColor);
    path.setAttribute('stroke', fillColor);
    path.addEventListener('mouseenter', (e) => showTooltip(e, d, cResult));
    path.addEventListener('mousemove', moveTooltip);
    path.addEventListener('mouseleave', hideTooltip);
    svg.appendChild(path);
  });

  MAP_DATA.forEach(d => {
    const b = document.createElementNS(ns, 'path');
    b.setAttribute('d', d.d);
    b.setAttribute('class', 'border-line');
    svg.appendChild(b);
  });

  // District number labels removed for cleaner look

  updateSeatCount(seatCounts);
}

function showTooltip(e, d, result) {
  const tt = document.getElementById('tooltip');
  let html = `<h3>${d.county} – #${d.n}</h3>`;
  if (result) {
    const entries = Object.entries(result).filter(([k]) => k !== 'counted' && k !== 'turnout');
    entries.sort((a, b) => b[1] - a[1]);
    if (result.counted !== undefined) {
      html += `<div class="counted">${result.counted}% counted</div>`;
    }
    entries.forEach(([party, pct]) => {
      const col = PARTIES[party] ? PARTIES[party].color : '#9CA3AF';
      html += `<div class="party-row"><span class="party-name" style="color:${col}">${party}</span><span class="party-pct">${pct.toFixed(1)}%</span></div>`;
    });
  } else {
    html += '<div class="no-data">No data</div>';
  }
  tt.innerHTML = html;
  tt.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const tt = document.getElementById('tooltip');
  const rect = document.getElementById('map-container').getBoundingClientRect();
  let left = e.clientX - rect.left + 15;
  if (left + 220 > rect.width) left = e.clientX - rect.left - 220;
  tt.style.left = left + 'px';
  tt.style.top = (e.clientY - rect.top - 10) + 'px';
}

function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

function updateSeatCount(seatCounts) {
  const div = document.getElementById('seatCount');
  const total = Object.values(seatCounts).reduce((a, b) => a + b, 0);
  if (total === 0) {
    div.innerHTML = '<span class="label">Constituency seats:</span> <span class="total">no results yet</span>';
    return;
  }
  let html = '<span class="label">Seats:</span> ';
  Object.entries(seatCounts).sort((a, b) => b[1] - a[1]).forEach(([party, seats]) => {
    const col = PARTIES[party] ? PARTIES[party].color : '#9CA3AF';
    html += `<span class="party-seats" style="color:${col}">${party} ${seats}</span>`;
  });
  html += `<span class="total">(${total}/106)</span>`;
  div.innerHTML = html;
}

function buildLegend() {
  const lg = document.getElementById('legend');
  for (const [, p] of Object.entries(PARTIES)) {
    lg.innerHTML += `<div class="legend-item"><div class="legend-swatch" style="background:${p.color}"></div>${p.name}</div>`;
  }
  lg.innerHTML += `<div class="legend-item"><div class="legend-swatch" style="background:${NO_DATA_COLOR}"></div>No data</div>`;
}

async function loadResults() {
  try {
    const data = await (await fetch('results.json?' + Date.now())).json();
    const el = document.getElementById('lastUpdated');
    el.textContent = 'Last updated: ' + new Date(data.lastUpdated).toLocaleString('en-GB', {dateStyle:'medium',timeStyle:'medium'});
    el.classList.toggle('live', Object.keys(data.constituencies || {}).length > 0);
    buildMap(data.constituencies || {});
  } catch (e) { buildMap({}); }
}

setInterval(async () => {
  try {
    const data = await (await fetch('results.json?' + Date.now())).json();
    const el = document.getElementById('lastUpdated');
    el.textContent = 'Last updated: ' + new Date(data.lastUpdated).toLocaleString('en-GB', {dateStyle:'medium',timeStyle:'medium'});
    el.classList.toggle('live', Object.keys(data.constituencies || {}).length > 0);
    document.getElementById('map').innerHTML = '';
    buildMap(data.constituencies || {});
  } catch(e) {}
}, 30000);

buildLegend();
loadResults();

// ── Zoom & Pan ──
const zoomState = {
  scale: 1,
  vbX: 0, vbY: 0,
  vbW: SVG_WIDTH, vbH: SVG_HEIGHT,
  minScale: 1, maxScale: 8,
  isPanning: false,
  startX: 0, startY: 0,
  startVbX: 0, startVbY: 0,
  pinchDist: 0
};

function updateViewBox() {
  const svg = document.getElementById('map');
  svg.setAttribute('viewBox', `${zoomState.vbX} ${zoomState.vbY} ${zoomState.vbW} ${zoomState.vbH}`);
  document.getElementById('zoomLevel').textContent = zoomState.scale.toFixed(1) + 'x';
}

function clampViewBox() {
  const maxX = SVG_WIDTH - zoomState.vbW;
  const maxY = SVG_HEIGHT - zoomState.vbH;
  zoomState.vbX = Math.max(0, Math.min(maxX, zoomState.vbX));
  zoomState.vbY = Math.max(0, Math.min(maxY, zoomState.vbY));
}

function zoomAt(cx, cy, factor) {
  const newScale = Math.max(zoomState.minScale, Math.min(zoomState.maxScale, zoomState.scale * factor));
  if (newScale === zoomState.scale) return;

  const newW = SVG_WIDTH / newScale;
  const newH = SVG_HEIGHT / newScale;

  // Zoom toward the cursor position (cx, cy are in viewBox coords)
  const ratio = 1 - newW / zoomState.vbW;
  zoomState.vbX += (cx - zoomState.vbX) * ratio;
  zoomState.vbY += (cy - zoomState.vbY) * ratio;
  zoomState.vbW = newW;
  zoomState.vbH = newH;
  zoomState.scale = newScale;
  clampViewBox();
  updateViewBox();
}

function resetZoom() {
  zoomState.scale = 1;
  zoomState.vbX = 0;
  zoomState.vbY = 0;
  zoomState.vbW = SVG_WIDTH;
  zoomState.vbH = SVG_HEIGHT;
  updateViewBox();
}

function svgPoint(e) {
  // Convert screen coords to SVG viewBox coords
  const svg = document.getElementById('map');
  const rect = svg.getBoundingClientRect();
  const sx = (e.clientX - rect.left) / rect.width;
  const sy = (e.clientY - rect.top) / rect.height;
  return {
    x: zoomState.vbX + sx * zoomState.vbW,
    y: zoomState.vbY + sy * zoomState.vbH
  };
}

// Mouse wheel zoom
document.getElementById('map-container').addEventListener('wheel', (e) => {
  e.preventDefault();
  const pt = svgPoint(e);
  const factor = e.deltaY < 0 ? 1.25 : 0.8;
  zoomAt(pt.x, pt.y, factor);
}, { passive: false });

// Mouse drag pan
const mapEl = document.getElementById('map-container');

mapEl.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  zoomState.isPanning = true;
  zoomState.startX = e.clientX;
  zoomState.startY = e.clientY;
  zoomState.startVbX = zoomState.vbX;
  zoomState.startVbY = zoomState.vbY;
});

window.addEventListener('mousemove', (e) => {
  if (!zoomState.isPanning) return;
  const svg = document.getElementById('map');
  const rect = svg.getBoundingClientRect();
  const dx = (e.clientX - zoomState.startX) / rect.width * zoomState.vbW;
  const dy = (e.clientY - zoomState.startY) / rect.height * zoomState.vbH;
  zoomState.vbX = zoomState.startVbX - dx;
  zoomState.vbY = zoomState.startVbY - dy;
  clampViewBox();
  updateViewBox();
});

window.addEventListener('mouseup', () => { zoomState.isPanning = false; });

// Touch: pinch-to-zoom + drag pan
function getTouchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function getTouchCenter(touches) {
  return {
    clientX: (touches[0].clientX + touches[1].clientX) / 2,
    clientY: (touches[0].clientY + touches[1].clientY) / 2
  };
}

mapEl.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    zoomState.isPanning = true;
    zoomState.startX = e.touches[0].clientX;
    zoomState.startY = e.touches[0].clientY;
    zoomState.startVbX = zoomState.vbX;
    zoomState.startVbY = zoomState.vbY;
  } else if (e.touches.length === 2) {
    zoomState.isPanning = false;
    zoomState.pinchDist = getTouchDist(e.touches);
  }
}, { passive: true });

mapEl.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 1 && zoomState.isPanning) {
    const svg = document.getElementById('map');
    const rect = svg.getBoundingClientRect();
    const dx = (e.touches[0].clientX - zoomState.startX) / rect.width * zoomState.vbW;
    const dy = (e.touches[0].clientY - zoomState.startY) / rect.height * zoomState.vbH;
    zoomState.vbX = zoomState.startVbX - dx;
    zoomState.vbY = zoomState.startVbY - dy;
    clampViewBox();
    updateViewBox();
  } else if (e.touches.length === 2) {
    const newDist = getTouchDist(e.touches);
    const center = getTouchCenter(e.touches);
    const pt = svgPoint(center);
    const factor = newDist / zoomState.pinchDist;
    zoomState.pinchDist = newDist;
    zoomAt(pt.x, pt.y, factor);
  }
}, { passive: false });

mapEl.addEventListener('touchend', () => { zoomState.isPanning = false; });

// Double-click to zoom in
mapEl.addEventListener('dblclick', (e) => {
  e.preventDefault();
  const pt = svgPoint(e);
  zoomAt(pt.x, pt.y, 2);
});

// Button controls
document.getElementById('zoomIn').addEventListener('click', () => {
  const cx = zoomState.vbX + zoomState.vbW / 2;
  const cy = zoomState.vbY + zoomState.vbH / 2;
  zoomAt(cx, cy, 1.5);
});

document.getElementById('zoomOut').addEventListener('click', () => {
  const cx = zoomState.vbX + zoomState.vbW / 2;
  const cy = zoomState.vbY + zoomState.vbH / 2;
  zoomAt(cx, cy, 0.67);
});

document.getElementById('zoomReset').addEventListener('click', resetZoom);
</script>
</body>
</html>
