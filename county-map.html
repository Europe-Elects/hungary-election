<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hungary 2026 – National List by County</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #F8FAFC; color: #1E293B;
  display: flex; flex-direction: column; overflow: hidden;
}
.container {
  max-width: 960px; margin: 0 auto; padding: 16px 16px 16px; width: 100%;
  flex: 1; display: flex; flex-direction: column; min-height: 0;
}

.header { margin-bottom: 12px; }
h1 { font-size: 20px; font-weight: 700; color: #0F172A; letter-spacing: -0.3px; }

.map-logo {
  position: absolute; top: 8px; left: 8px; z-index: 4;
  opacity: 0.85; pointer-events: none;
}
.map-logo img { height: 28px; width: auto; }

.footer {
  margin-top: 8px; font-size: 11px; color: #64748B; text-align: center;
}
.subtitle { font-size: 13px; color: #64748B; margin-top: 2px; }
.last-updated {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; color: #475569; margin-top: 6px;
  padding: 3px 8px; background: #F1F5F9; border-radius: 4px;
}
.last-updated::before {
  content: ''; display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: #64748B;
}
.last-updated.live::before { background: #22C55E; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

#map-container {
  position: relative; width: 100%; overflow: hidden;
  background: #fff; border-radius: 8px; border: 1px solid #E2E8F0;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
  flex: 1 1 auto; min-height: 0;
}
svg { width: 100%; height: 100%; display: block; }
.county {
  stroke: #475569; stroke-width: 1; stroke-linejoin: round;
  cursor: pointer; transition: opacity .2s ease; fill-rule: evenodd;
}
.county:hover { opacity: 0.7; stroke-width: 1.8; }
.county-label {
  font-family: 'Inter', sans-serif; font-size: 9px; fill: #334155;
  text-anchor: middle; pointer-events: none; font-weight: 600;
}
.county-label.light { fill: #fff; paint-order: stroke; stroke: rgba(0,0,0,0.35); stroke-width: 1px; }
.county-pct {
  font-family: 'Inter', sans-serif; font-size: 7.5px; fill: #64748B;
  text-anchor: middle; pointer-events: none; font-variant-numeric: tabular-nums;
}
.county-pct.light { fill: rgba(255,255,255,0.9); paint-order: stroke; stroke: rgba(0,0,0,0.3); stroke-width: 0.5px; }

#tooltip {
  display: none; position: absolute; background: #fff; border: 1px solid #E2E8F0;
  border-radius: 8px; padding: 12px 16px; font-size: 12px; pointer-events: none;
  box-shadow: 0 4px 12px rgba(0,0,0,.12); z-index: 10; min-width: 240px;
}
#tooltip h3 { font-size: 14px; font-weight: 600; color: #0F172A; margin-bottom: 8px; }
.bar-row { display: flex; align-items: center; margin-bottom: 4px; gap: 6px; }
.bar-label { width: 130px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.bar-container { flex: 1; height: 12px; background: #F1F5F9; border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width .3s ease; }
.bar-pct { font-size: 11px; color: #64748B; width: 44px; text-align: right; font-variant-numeric: tabular-nums; }
.no-data { color: #94A3B8; font-style: italic; }

.legend {
  display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;
  font-size: 12px; color: #475569;
}
.legend-item {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 8px; border-radius: 6px; border: 1px solid transparent;
  transition: background .15s, border-color .15s, box-shadow .15s;
  user-select: none;
  /* Reset button defaults where legend-item is rendered as <button> */
  background: transparent; font-family: inherit; font-size: inherit; color: inherit;
}
button.legend-item { line-height: 1.4; }
.legend-item.clickable { cursor: pointer; }
.legend-item.clickable:hover { background: #F1F5F9; border-color: #E2E8F0; }
.legend-item.clickable:focus { outline: none; }
.legend-item.clickable:focus-visible {
  outline: 2px solid #2563EB;
  outline-offset: 2px;
  background: #F1F5F9;
  border-color: #94A3B8;
}
.legend-item.active {
  background: #fff; border-color: #64748B;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
  font-weight: 600; color: #0F172A;
}
.legend-swatch { width: 12px; height: 12px; border-radius: 3px; }
.legend-hint {
  font-size: 11px; color: #94A3B8; margin-top: 6px;
}

@media (prefers-reduced-motion: reduce) {
  .county { transition: none; }
  .bar-fill { transition: none; }
  @keyframes pulse { 0%, 100% { opacity: 1; } }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="subtitle">Party list vote share across 20 counties</div>
    <div class="last-updated" id="lastUpdated">Last updated: –</div>
  </div>
  <div id="map-container">
    <svg id="map"></svg>
    <div class="map-logo"><img src="logo.png" alt="Europe Elects"></div>
    <div id="tooltip"></div>
  </div>
  <div class="legend" id="legend"></div>
  <div class="legend-hint" id="legendHint">Click a party to shade counties by that party's vote share</div>
  <div class="footer">Map created by Andrei Miclea and the EuropeElects team · Source: Hungarian National Election Office VIP Service</div>
</div>

<script src="county-data.js"></script>
<script>
const PARTIES = {
  'FIDESZ-KDNP': { color: '#000000', name: 'FIDESZ-KDNP (PfE)' },
  'TISZA':       { color: '#3399FF', name: 'TISZA (EPP)' },
  'DK':          { color: '#FF0000', name: 'DK (S&D)' },
  'Mi Hazánk':   { color: '#70463A', name: 'Mi Hazánk (ESN)' },
  'MKKP':        { color: '#009900', name: 'MKKP (→Greens/EFA)' },
};
const NO_DATA_COLOR = '#E2E8F0';

// View state: 'winner' or a party key from PARTIES
let currentView = 'winner';
// Cached county data so legend clicks can re-render without re-fetching
let lastCountyData = {};

function hexToRgb(hex) {
  const h = hex.replace('#', '');
  return {
    r: parseInt(h.slice(0, 2), 16),
    g: parseInt(h.slice(2, 4), 16),
    b: parseInt(h.slice(4, 6), 16),
  };
}
function parseRgb(str) {
  if (!str) return null;
  if (str.startsWith('#')) return hexToRgb(str);
  const m = str.match(/\d+/g);
  return m ? { r: +m[0], g: +m[1], b: +m[2] } : null;
}
function isLightFill(fill) {
  const c = parseRgb(fill);
  if (!c) return true;
  // Perceived luminance
  const lum = (0.299 * c.r + 0.587 * c.g + 0.114 * c.b) / 255;
  return lum > 0.62;
}
function partyShade(pct, maxPct, baseHex) {
  if (pct === null || pct === undefined || pct <= 0) return NO_DATA_COLOR;
  const t = Math.max(0, Math.min(1, pct / Math.max(maxPct, 0.01)));
  const base = hexToRgb(baseHex);
  // White → base color interpolation
  const r = Math.round(255 + (base.r - 255) * t);
  const g = Math.round(255 + (base.g - 255) * t);
  const b = Math.round(255 + (base.b - 255) * t);
  return `rgb(${r},${g},${b})`;
}
function partyMaxPct(countyData, party) {
  let mx = 0;
  for (const d of Object.values(countyData || {})) {
    if (d && typeof d[party] === 'number' && d[party] > mx) mx = d[party];
  }
  // 10% floor so tiny parties still produce a visible gradient;
  // 10% headroom so the darkest county isn't pinned to max.
  return Math.max(10, mx * 1.1);
}

const COUNTY_ABBR = {
  'Budapest': 'Budapest', 'Bács-Kiskun': 'Bács-Kiskun', 'Baranya': 'Baranya',
  'Békés': 'Békés', 'Borsod-Abaúj-Zemplén': 'Borsod-Abaúj-\nZemplén',
  'Csongrád-Csanád': 'Csongrád-\nCsanád', 'Fejér': 'Fejér',
  'Győr-Moson-Sopron': 'Győr-Moson-\nSopron', 'Hajdú-Bihar': 'Hajdú-Bihar',
  'Heves': 'Heves', 'Jász-Nagykun-Szolnok': 'Jász-Nagykun-\nSzolnok',
  'Komárom-Esztergom': 'Komárom-\nEsztergom', 'Nógrád': 'Nógrád',
  'Pest': 'Pest', 'Somogy': 'Somogy',
  'Szabolcs-Szatmár-Bereg': 'Szabolcs-Szatmár-\nBereg',
  'Tolna': 'Tolna', 'Vas': 'Vas', 'Veszprém': 'Veszprém', 'Zala': 'Zala',
};

function getWinner(d) {
  if (!d) return null;
  let max = 0, w = null;
  for (const [p, v] of Object.entries(d)) { if (v > max) { max = v; w = p; } }
  return max > 0 ? { party: w, pct: max } : null;
}
function hasData(d) { return d && Object.values(d).some(v => v > 0); }

function buildMap(countyData) {
  const svg = document.getElementById('map');
  const ns = 'http://www.w3.org/2000/svg';
  svg.setAttribute('viewBox', `0 0 ${COUNTY_SVG_WIDTH} ${COUNTY_SVG_HEIGHT}`);
  svg.innerHTML = '';

  // In party mode, compute a single max once for the whole map
  const partyMode = currentView !== 'winner';
  const maxForParty = partyMode ? partyMaxPct(countyData, currentView) : 0;
  const partyBaseColor = partyMode ? PARTIES[currentView].color : null;

  // Pass 1: fill polygons
  COUNTY_MAP_DATA.forEach(c => {
    const data = countyData[c.id];
    let fillColor;
    if (partyMode) {
      const pct = (data && typeof data[currentView] === 'number') ? data[currentView] : null;
      fillColor = partyShade(pct, maxForParty, partyBaseColor);
    } else {
      const winner = getWinner(data);
      fillColor = winner ? PARTIES[winner.party].color : NO_DATA_COLOR;
    }

    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', c.d);
    path.setAttribute('class', 'county');
    path.setAttribute('fill', fillColor);
    path.addEventListener('mouseenter', (e) => showTooltip(e, c.id, data));
    path.addEventListener('mousemove', moveTooltip);
    path.addEventListener('mouseleave', hideTooltip);
    svg.appendChild(path);
  });

  // Pass 2: county name + primary number label
  COUNTY_MAP_DATA.forEach(c => {
    const data = countyData[c.id];
    let fillColor, primaryValue;
    if (partyMode) {
      const pct = (data && typeof data[currentView] === 'number') ? data[currentView] : null;
      fillColor = partyShade(pct, maxForParty, partyBaseColor);
      primaryValue = (pct !== null && pct > 0) ? pct : null;
    } else {
      const winner = getWinner(data);
      fillColor = winner ? PARTIES[winner.party].color : NO_DATA_COLOR;
      primaryValue = winner ? winner.pct : null;
    }
    const isLight = isLightFill(fillColor);
    const abbr = COUNTY_ABBR[c.id] || c.id;
    const lines = abbr.split('\n');
    const isBudapest = c.id === 'Budapest';
    const fs = isBudapest ? 7 : 9;

    lines.forEach((line, i) => {
      const t = document.createElementNS(ns, 'text');
      t.setAttribute('x', c.cx);
      t.setAttribute('y', c.cy - (lines.length - 1) * (fs * 0.6) + i * (fs * 1.2) + (primaryValue !== null ? -4 : 0));
      t.setAttribute('class', 'county-label' + (isLight ? '' : ' light'));
      if (isBudapest) t.setAttribute('style', 'font-size:7px');
      t.textContent = line;
      svg.appendChild(t);
    });

    if (primaryValue !== null) {
      const p = document.createElementNS(ns, 'text');
      p.setAttribute('x', c.cx);
      p.setAttribute('y', c.cy + lines.length * (fs * 0.6) + 4);
      p.setAttribute('class', 'county-pct' + (isLight ? '' : ' light'));
      if (isBudapest) p.setAttribute('style', 'font-size:6px');
      p.textContent = primaryValue.toFixed(1) + '%';
      svg.appendChild(p);
    }
  });
}

function showTooltip(e, county, data) {
  const tt = document.getElementById('tooltip');
  let html = `<h3>${county}</h3>`;
  if (data && hasData(data)) {
    Object.entries(data).sort((a, b) => b[1] - a[1]).forEach(([party, pct]) => {
      const col = PARTIES[party] ? PARTIES[party].color : '#9CA3AF';
      const isActive = currentView === party;
      const rowStyle = isActive ? 'font-weight:700;' : '';
      html += `<div class="bar-row" style="${rowStyle}">
        <div class="bar-label" style="color:${col}">${party}${isActive ? ' ●' : ''}</div>
        <div class="bar-container"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
        <div class="bar-pct">${pct.toFixed(1)}%</div>
      </div>`;
    });
  } else {
    html += '<div class="no-data">No data – 0% for all parties</div>';
  }
  tt.innerHTML = html;
  tt.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const tt = document.getElementById('tooltip');
  const rect = document.getElementById('map-container').getBoundingClientRect();
  let left = e.clientX - rect.left + 15;
  if (left + 250 > rect.width) left = e.clientX - rect.left - 250;
  tt.style.left = left + 'px';
  tt.style.top = (e.clientY - rect.top - 10) + 'px';
}
function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

function buildLegend() {
  const lg = document.getElementById('legend');
  lg.innerHTML = '';
  lg.setAttribute('role', 'group');
  lg.setAttribute('aria-label', 'Party drill-down selector');

  for (const [key, p] of Object.entries(PARTIES)) {
    const item = document.createElement('button');
    item.type = 'button';
    item.className = 'legend-item clickable' + (currentView === key ? ' active' : '');
    item.dataset.party = key;
    item.setAttribute('aria-pressed', currentView === key ? 'true' : 'false');
    item.setAttribute('aria-label', `Show ${p.name} vote share by county`);
    item.innerHTML = `<div class="legend-swatch" style="background:${p.color}"></div>${p.name}`;
    item.addEventListener('click', () => {
      currentView = (currentView === key) ? 'winner' : key;
      updateLegendActiveState();
      updateLegendHint();
      buildMap(lastCountyData);
    });
    lg.appendChild(item);
  }
  const noData = document.createElement('div');
  noData.className = 'legend-item';
  noData.innerHTML = `<div class="legend-swatch" style="background:${NO_DATA_COLOR}"></div>No data`;
  lg.appendChild(noData);
}

function updateLegendActiveState() {
  document.querySelectorAll('.legend-item.clickable').forEach(el => {
    const active = el.dataset.party === currentView;
    el.classList.toggle('active', active);
    el.setAttribute('aria-pressed', active ? 'true' : 'false');
  });
}

function updateLegendHint() {
  const hint = document.getElementById('legendHint');
  if (currentView === 'winner') {
    hint.textContent = "Click a party to shade counties by that party's vote share";
  } else {
    const p = PARTIES[currentView];
    hint.textContent = `Showing ${p.name} vote share by county — click again to return to winner view`;
  }
}

function applyResults(data) {
  const el = document.getElementById('lastUpdated');
  el.textContent = 'Last updated: ' + new Date(data.lastUpdated).toLocaleString('en-GB', {dateStyle:'medium',timeStyle:'medium'});
  const countyData = data.countyList || {};
  lastCountyData = countyData;
  const hasAny = Object.values(countyData).some(d => hasData(d));
  el.classList.toggle('live', hasAny);
  buildMap(countyData);
}

async function loadResults() {
  try {
    const data = await (await fetch('results.json?' + Date.now())).json();
    applyResults(data);
  } catch(e) { buildMap({}); }
}

setInterval(async () => {
  try {
    const data = await (await fetch('results.json?' + Date.now())).json();
    applyResults(data);
  } catch(e) {}
}, 30000);

buildLegend();
updateLegendHint();
loadResults();
</script>
</body>
</html>
