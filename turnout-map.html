<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hungary 2026 – Turnout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #F8FAFC; color: #1E293B;
  display: flex; flex-direction: column; overflow: hidden;
}
.container {
  max-width: 960px; margin: 0 auto; padding: 16px 16px 16px; width: 100%;
  flex: 1; display: flex; flex-direction: column; min-height: 0;
}

/* Header */
.header { margin-bottom: 12px; }
h1 { font-size: 20px; font-weight: 700; color: #0F172A; letter-spacing: -0.3px; }
.subtitle { font-size: 13px; color: #64748B; margin-top: 2px; }
.last-updated {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; color: #475569; margin-top: 6px;
  padding: 3px 8px; background: #F1F5F9; border-radius: 4px;
}
.last-updated::before {
  content: ''; display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: #64748B;
}
.last-updated.live::before { background: #22C55E; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Tabs */
.tabs {
  display: flex; gap: 4px; margin-bottom: 8px;
  background: #F1F5F9; padding: 4px; border-radius: 8px;
  border: 1px solid #E2E8F0;
}
.tab {
  flex: 1; padding: 8px 14px; border: none; background: transparent;
  font-family: inherit; font-size: 13px; font-weight: 600; color: #64748B;
  border-radius: 6px; cursor: pointer; transition: background .15s, color .15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.tab:hover { color: #0F172A; }
.tab.active { background: #fff; color: #0F172A; box-shadow: 0 1px 2px rgba(0,0,0,.06); }
.tab .count { font-weight: 500; color: #94A3B8; font-variant-numeric: tabular-nums; }
.tab.active .count { color: #64748B; }

/* Map */
#map-container {
  position: relative; width: 100%; overflow: hidden;
  background: #fff; border-radius: 8px; border: 1px solid #E2E8F0;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
  touch-action: none;
  flex: 1 1 auto; min-height: 0;
}
svg { width: 100%; height: 100%; display: block; cursor: grab; }
svg:active { cursor: grabbing; }
.district { stroke-width: 0.3; cursor: pointer; transition: opacity .2s ease; stroke-linejoin: round; }
.district:hover { opacity: 0.7; }
.border-line { fill: none; stroke: rgba(255,255,255,0.7); stroke-width: 0.5; pointer-events: none; stroke-linejoin: round; }

/* Logo overlay */
.map-logo {
  position: absolute; top: 8px; left: 8px; z-index: 4;
  opacity: 0.85; pointer-events: none;
}
.map-logo img { height: 28px; width: auto; }

/* Footer */
.footer {
  margin-top: 8px; font-size: 11px; color: #64748B; text-align: center;
}

/* Zoom controls */
.zoom-controls {
  position: absolute; bottom: 12px; right: 12px; display: flex; flex-direction: column; gap: 4px; z-index: 5;
}
.zoom-btn {
  width: 32px; height: 32px; border: 1px solid #E2E8F0; border-radius: 6px;
  background: #fff; color: #475569; font-size: 16px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 1px 3px rgba(0,0,0,.1); transition: background .15s, color .15s;
  line-height: 1; user-select: none;
}
.zoom-btn:hover { background: #F1F5F9; color: #0F172A; }
.zoom-btn:active { background: #E2E8F0; }
.zoom-btn.reset { font-size: 11px; font-weight: 500; }
.zoom-level {
  font-size: 10px; color: #94A3B8; text-align: center; padding: 2px 0;
  font-variant-numeric: tabular-nums; user-select: none;
}

/* Tooltip */
#tooltip {
  display: none; position: absolute; background: #fff; border: 1px solid #E2E8F0;
  border-radius: 8px; padding: 10px 14px; font-size: 12px; pointer-events: none;
  box-shadow: 0 4px 12px rgba(0,0,0,.12); z-index: 10; min-width: 200px; max-width: 280px;
}
#tooltip h3 { font-size: 13px; font-weight: 600; color: #0F172A; margin-bottom: 6px; }
#tooltip .reported { font-size: 11px; color: #64748B; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid #F1F5F9; }
#tooltip .turnout-row { display: flex; align-items: center; justify-content: space-between; padding: 2px 0; }
#tooltip .turnout-label { font-weight: 500; color: #475569; }
#tooltip .turnout-value { color: #0F172A; font-weight: 600; font-variant-numeric: tabular-nums; }
#tooltip .voters { font-size: 11px; color: #94A3B8; margin-top: 4px; padding-top: 4px; border-top: 1px solid #F1F5F9; }
#tooltip .no-data { color: #94A3B8; font-style: italic; }

/* National summary */
.national-summary {
  margin-top: 10px; padding: 12px 16px;
  background: #fff; border-radius: 8px; border: 1px solid #E2E8F0;
  display: flex; gap: 18px; flex-wrap: wrap; align-items: center;
}
.national-summary .label { font-size: 12px; font-weight: 600; color: #475569; }
.national-summary .big-number {
  font-size: 22px; font-weight: 700; color: #0F172A;
  font-variant-numeric: tabular-nums; line-height: 1;
}
.national-summary .voters-info {
  font-size: 11px; color: #94A3B8; font-variant-numeric: tabular-nums;
}
.national-summary .report-time {
  font-size: 11px; color: #64748B; margin-left: auto;
  padding: 4px 10px; background: #F1F5F9; border-radius: 4px;
  font-variant-numeric: tabular-nums;
}

/* Legend gradient */
.legend {
  display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px;
  font-size: 12px; color: #475569; align-items: center;
}
.legend-gradient {
  display: flex; align-items: center; gap: 8px; flex: 1; min-width: 280px;
}
.legend-gradient .gradient-bar {
  flex: 1; height: 12px; border-radius: 3px;
  background: linear-gradient(to right,
    #FEF3C7 0%,
    #FDE68A 15%,
    #FCD34D 30%,
    #F59E0B 45%,
    #D97706 60%,
    #B45309 75%,
    #92400E 90%,
    #78350F 100%);
  border: 1px solid #E2E8F0;
}
.legend-gradient .gradient-label { font-size: 11px; color: #475569; font-variant-numeric: tabular-nums; }
.legend-item.no-data-item { display: flex; align-items: center; gap: 5px; }
.legend-item .legend-swatch { width: 12px; height: 12px; border-radius: 3px; }

@media (prefers-reduced-motion: reduce) {
  .district { transition: none; }
  @keyframes pulse { 0%, 100% { opacity: 1; } }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="subtitle" id="subtitle">Live voter turnout, updated every 2 hours</div>
    <div class="last-updated" id="lastUpdated">Last updated: –</div>
  </div>
  <div class="tabs" role="tablist" aria-label="Turnout layer">
    <button class="tab active" id="tab-const" role="tab" aria-selected="true" data-layer="const">
      Constituencies <span class="count">106</span>
    </button>
    <button class="tab" id="tab-county" role="tab" aria-selected="false" data-layer="county">
      Counties <span class="count">20</span>
    </button>
  </div>
  <div id="map-container">
    <svg id="map"></svg>
    <div class="map-logo"><img src="logo.png" alt="Europe Elects"></div>
    <div id="tooltip"></div>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoomIn" title="Zoom in">+</button>
      <div class="zoom-level" id="zoomLevel">1x</div>
      <button class="zoom-btn" id="zoomOut" title="Zoom out">&minus;</button>
      <button class="zoom-btn reset" id="zoomReset" title="Reset view">&#8634;</button>
    </div>
  </div>
  <div class="national-summary" id="nationalSummary"></div>
  <div class="legend" id="legend"></div>
  <div class="footer">Map created by Andrei Miclea and the EuropeElects team · Source: Hungarian National Election Office VIP Service</div>
</div>

<script src="map-data.js"></script>
<script src="county-data.js"></script>
<script>
const NO_DATA_COLOR = '#E2E8F0';

// ── Layer state ──
// 'const' = 106 constituencies (map-data.js / MAP_DATA / SVG_WIDTH / SVG_HEIGHT)
// 'county' = 20 counties      (county-data.js / COUNTY_MAP_DATA / COUNTY_SVG_WIDTH / COUNTY_SVG_HEIGHT)
let currentLayer = 'const';
try {
  const saved = localStorage.getItem('turnoutLayer');
  if (saved === 'const' || saved === 'county') currentLayer = saved;
} catch (e) {}

function layerDims() {
  return currentLayer === 'county'
    ? { w: COUNTY_SVG_WIDTH, h: COUNTY_SVG_HEIGHT }
    : { w: SVG_WIDTH, h: SVG_HEIGHT };
}

let lastTurnoutData = null;

// Sequential colour scale: amber → dark brown
// Anchored at fixed turnout %s so colour stays meaningful across the day
const COLOR_STOPS = [
  { pct: 0,  color: [254, 243, 199] }, // #FEF3C7
  { pct: 15, color: [253, 230, 138] }, // #FDE68A
  { pct: 30, color: [252, 211, 77]  }, // #FCD34D
  { pct: 45, color: [245, 158, 11]  }, // #F59E0B
  { pct: 60, color: [217, 119, 6]   }, // #D97706
  { pct: 75, color: [180, 83,  9]   }, // #B45309
  { pct: 85, color: [146, 64,  14]  }, // #92400E
  { pct: 95, color: [120, 53,  15]  }, // #78350F
];

function turnoutColor(pct) {
  if (pct === null || pct === undefined || pct === 0) return NO_DATA_COLOR;
  // Find the bracket and interpolate
  for (let i = 0; i < COLOR_STOPS.length - 1; i++) {
    const a = COLOR_STOPS[i], b = COLOR_STOPS[i + 1];
    if (pct >= a.pct && pct <= b.pct) {
      const t = (pct - a.pct) / (b.pct - a.pct);
      const r = Math.round(a.color[0] + (b.color[0] - a.color[0]) * t);
      const g = Math.round(a.color[1] + (b.color[1] - a.color[1]) * t);
      const bb = Math.round(a.color[2] + (b.color[2] - a.color[2]) * t);
      return `rgb(${r},${g},${bb})`;
    }
  }
  // Above 95% — use final colour
  const last = COLOR_STOPS[COLOR_STOPS.length - 1].color;
  return `rgb(${last[0]},${last[1]},${last[2]})`;
}

function buildMap(turnoutData) {
  const svg = document.getElementById('map');
  const ns = 'http://www.w3.org/2000/svg';
  const dims = layerDims();
  svg.setAttribute('viewBox', `${zoomState.vbX} ${zoomState.vbY} ${zoomState.vbW} ${zoomState.vbH}`);
  svg.innerHTML = '';

  if (currentLayer === 'county') {
    const counties = (turnoutData && turnoutData.counties) || {};
    COUNTY_MAP_DATA.forEach(c => {
      const record = counties[c.id];
      const pct = record ? record.pct : null;
      const fillColor = turnoutColor(pct);

      const path = document.createElementNS(ns, 'path');
      path.setAttribute('d', c.d);
      path.setAttribute('class', 'district');
      path.setAttribute('data-id', c.id);
      path.setAttribute('fill', fillColor);
      path.setAttribute('stroke', fillColor);
      path.addEventListener('mouseenter', (e) => showCountyTooltip(e, c, record));
      path.addEventListener('mousemove', moveTooltip);
      path.addEventListener('mouseleave', hideTooltip);
      svg.appendChild(path);
    });
    // Border lines
    COUNTY_MAP_DATA.forEach(c => {
      const b = document.createElementNS(ns, 'path');
      b.setAttribute('d', c.d);
      b.setAttribute('class', 'border-line');
      svg.appendChild(b);
    });
  } else {
    const constituencies = (turnoutData && turnoutData.constituencies) || {};
    MAP_DATA.forEach(d => {
      const record = constituencies[d.id];
      const pct = record ? record.pct : null;
      const fillColor = turnoutColor(pct);

      const path = document.createElementNS(ns, 'path');
      path.setAttribute('d', d.d);
      path.setAttribute('class', 'district');
      path.setAttribute('data-id', d.id);
      path.setAttribute('fill', fillColor);
      path.setAttribute('stroke', fillColor);
      path.addEventListener('mouseenter', (e) => showConstTooltip(e, d, record));
      path.addEventListener('mousemove', moveTooltip);
      path.addEventListener('mouseleave', hideTooltip);
      svg.appendChild(path);
    });
    // Border lines
    MAP_DATA.forEach(d => {
      const b = document.createElementNS(ns, 'path');
      b.setAttribute('d', d.d);
      b.setAttribute('class', 'border-line');
      svg.appendChild(b);
    });
  }
}

function tooltipBody(record) {
  if (record && record.pct !== undefined) {
    let html = `<div class="reported">Reported at ${record.time}</div>`;
    html += `<div class="turnout-row"><span class="turnout-label">Turnout</span><span class="turnout-value">${record.pct.toFixed(2)}%</span></div>`;
    if (record.megj !== undefined && record.vp !== undefined) {
      html += `<div class="voters">${record.megj.toLocaleString('en-GB')} of ${record.vp.toLocaleString('en-GB')} eligible voters</div>`;
    }
    return html;
  }
  return '<div class="no-data">No turnout data yet</div>';
}

function showConstTooltip(e, d, record) {
  const tt = document.getElementById('tooltip');
  tt.innerHTML = `<h3>${d.county} – #${d.n}</h3>` + tooltipBody(record);
  tt.style.display = 'block';
  moveTooltip(e);
}

function showCountyTooltip(e, c, record) {
  const tt = document.getElementById('tooltip');
  tt.innerHTML = `<h3>${c.id}</h3>` + tooltipBody(record);
  tt.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const tt = document.getElementById('tooltip');
  const rect = document.getElementById('map-container').getBoundingClientRect();
  let left = e.clientX - rect.left + 15;
  if (left + 220 > rect.width) left = e.clientX - rect.left - 220;
  tt.style.left = left + 'px';
  tt.style.top = (e.clientY - rect.top - 10) + 'px';
}

function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

function updateNationalSummary(turnoutData) {
  const div = document.getElementById('nationalSummary');
  if (!turnoutData || !turnoutData.national) {
    div.innerHTML = '<span class="label">National turnout:</span> <span class="voters-info">Awaiting first report (7:00)</span>';
    return;
  }
  const nat = turnoutData.national;
  const reportTime = turnoutData.lastReportTime || nat.time || '–';
  const megjFmt = nat.megj.toLocaleString('en-GB');
  const vpFmt = nat.vp.toLocaleString('en-GB');
  div.innerHTML = `
    <div>
      <div class="label">National turnout</div>
      <div class="big-number">${nat.pct.toFixed(2)}%</div>
      <div class="voters-info">${megjFmt} of ${vpFmt} voters</div>
    </div>
    <div class="report-time">As of ${reportTime}</div>
  `;
}

function buildLegend() {
  const lg = document.getElementById('legend');
  lg.innerHTML = `
    <div class="legend-gradient">
      <span class="gradient-label">0%</span>
      <div class="gradient-bar"></div>
      <span class="gradient-label">100%</span>
    </div>
    <div class="legend-item no-data-item"><div class="legend-swatch" style="background:${NO_DATA_COLOR}"></div>No data</div>
  `;
}

function applyTurnoutData(data) {
  const el = document.getElementById('lastUpdated');
  el.textContent = 'Last updated: ' + new Date(data.lastUpdated).toLocaleString('en-GB', {dateStyle:'medium',timeStyle:'medium'});
  const turnout = data.turnout || {};
  lastTurnoutData = turnout;
  const layerHasData = currentLayer === 'county'
    ? turnout.counties && Object.keys(turnout.counties).length > 0
    : turnout.constituencies && Object.keys(turnout.constituencies).length > 0;
  el.classList.toggle('live', !!layerHasData);
  buildMap(turnout);
  updateNationalSummary(turnout);
}

async function loadResults() {
  try {
    const data = await (await fetch('results.json?' + Date.now())).json();
    applyTurnoutData(data);
  } catch (e) {
    buildMap({});
    updateNationalSummary(null);
  }
}

setInterval(async () => {
  try {
    const data = await (await fetch('results.json?' + Date.now())).json();
    applyTurnoutData(data);
  } catch(e) {}
}, 30000);

// ── Tab switching ──
function updateSubtitle() {
  const sub = document.getElementById('subtitle');
  sub.textContent = currentLayer === 'county'
    ? 'Live voter turnout by county (20), updated every ~2 hours'
    : 'Live voter turnout by constituency (OEVK, 106), updated every ~2 hours';
}

function setLayer(layer) {
  if (layer !== 'const' && layer !== 'county') return;
  if (layer === currentLayer) return;
  currentLayer = layer;
  try { localStorage.setItem('turnoutLayer', layer); } catch (e) {}

  document.querySelectorAll('.tab').forEach(btn => {
    const active = btn.dataset.layer === layer;
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-selected', active ? 'true' : 'false');
  });

  updateSubtitle();
  resetZoom();               // resets viewBox to the new layer's dims
  if (lastTurnoutData) buildMap(lastTurnoutData); else buildMap({});
  // Refresh the live indicator for the new layer
  if (lastTurnoutData) {
    const el = document.getElementById('lastUpdated');
    const layerHasData = layer === 'county'
      ? lastTurnoutData.counties && Object.keys(lastTurnoutData.counties).length > 0
      : lastTurnoutData.constituencies && Object.keys(lastTurnoutData.constituencies).length > 0;
    el.classList.toggle('live', !!layerHasData);
  }
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => setLayer(btn.dataset.layer));
});

// Initialise active tab UI from persisted state
document.querySelectorAll('.tab').forEach(btn => {
  const active = btn.dataset.layer === currentLayer;
  btn.classList.toggle('active', active);
  btn.setAttribute('aria-selected', active ? 'true' : 'false');
});
updateSubtitle();

buildLegend();
loadResults();

// ── Zoom & Pan (layer-aware — reads dims from current layer) ──
const _initDims = layerDims();
const zoomState = {
  scale: 1,
  vbX: 0, vbY: 0,
  vbW: _initDims.w, vbH: _initDims.h,
  minScale: 1, maxScale: 8,
  isPanning: false,
  startX: 0, startY: 0,
  startVbX: 0, startVbY: 0,
  pinchDist: 0
};

function updateViewBox() {
  const svg = document.getElementById('map');
  svg.setAttribute('viewBox', `${zoomState.vbX} ${zoomState.vbY} ${zoomState.vbW} ${zoomState.vbH}`);
  document.getElementById('zoomLevel').textContent = zoomState.scale.toFixed(1) + 'x';
}

function clampViewBox() {
  const dims = layerDims();
  const maxX = dims.w - zoomState.vbW;
  const maxY = dims.h - zoomState.vbH;
  zoomState.vbX = Math.max(0, Math.min(maxX, zoomState.vbX));
  zoomState.vbY = Math.max(0, Math.min(maxY, zoomState.vbY));
}

function zoomAt(cx, cy, factor) {
  const newScale = Math.max(zoomState.minScale, Math.min(zoomState.maxScale, zoomState.scale * factor));
  if (newScale === zoomState.scale) return;
  const dims = layerDims();
  const newW = dims.w / newScale;
  const newH = dims.h / newScale;
  const ratio = 1 - newW / zoomState.vbW;
  zoomState.vbX += (cx - zoomState.vbX) * ratio;
  zoomState.vbY += (cy - zoomState.vbY) * ratio;
  zoomState.vbW = newW;
  zoomState.vbH = newH;
  zoomState.scale = newScale;
  clampViewBox();
  updateViewBox();
}

function resetZoom() {
  const dims = layerDims();
  zoomState.scale = 1;
  zoomState.vbX = 0;
  zoomState.vbY = 0;
  zoomState.vbW = dims.w;
  zoomState.vbH = dims.h;
  updateViewBox();
}

function svgPoint(e) {
  const svg = document.getElementById('map');
  const rect = svg.getBoundingClientRect();
  const sx = (e.clientX - rect.left) / rect.width;
  const sy = (e.clientY - rect.top) / rect.height;
  return {
    x: zoomState.vbX + sx * zoomState.vbW,
    y: zoomState.vbY + sy * zoomState.vbH
  };
}

document.getElementById('map-container').addEventListener('wheel', (e) => {
  e.preventDefault();
  const pt = svgPoint(e);
  const factor = e.deltaY < 0 ? 1.25 : 0.8;
  zoomAt(pt.x, pt.y, factor);
}, { passive: false });

const mapEl = document.getElementById('map-container');

mapEl.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  zoomState.isPanning = true;
  zoomState.startX = e.clientX;
  zoomState.startY = e.clientY;
  zoomState.startVbX = zoomState.vbX;
  zoomState.startVbY = zoomState.vbY;
});

window.addEventListener('mousemove', (e) => {
  if (!zoomState.isPanning) return;
  const svg = document.getElementById('map');
  const rect = svg.getBoundingClientRect();
  const dx = (e.clientX - zoomState.startX) / rect.width * zoomState.vbW;
  const dy = (e.clientY - zoomState.startY) / rect.height * zoomState.vbH;
  zoomState.vbX = zoomState.startVbX - dx;
  zoomState.vbY = zoomState.startVbY - dy;
  clampViewBox();
  updateViewBox();
});

window.addEventListener('mouseup', () => { zoomState.isPanning = false; });

function getTouchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function getTouchCenter(touches) {
  return {
    clientX: (touches[0].clientX + touches[1].clientX) / 2,
    clientY: (touches[0].clientY + touches[1].clientY) / 2
  };
}

mapEl.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    zoomState.isPanning = true;
    zoomState.startX = e.touches[0].clientX;
    zoomState.startY = e.touches[0].clientY;
    zoomState.startVbX = zoomState.vbX;
    zoomState.startVbY = zoomState.vbY;
  } else if (e.touches.length === 2) {
    zoomState.isPanning = false;
    zoomState.pinchDist = getTouchDist(e.touches);
  }
}, { passive: true });

mapEl.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 1 && zoomState.isPanning) {
    const svg = document.getElementById('map');
    const rect = svg.getBoundingClientRect();
    const dx = (e.touches[0].clientX - zoomState.startX) / rect.width * zoomState.vbW;
    const dy = (e.touches[0].clientY - zoomState.startY) / rect.height * zoomState.vbH;
    zoomState.vbX = zoomState.startVbX - dx;
    zoomState.vbY = zoomState.startVbY - dy;
    clampViewBox();
    updateViewBox();
  } else if (e.touches.length === 2) {
    const newDist = getTouchDist(e.touches);
    const center = getTouchCenter(e.touches);
    const pt = svgPoint(center);
    const factor = newDist / zoomState.pinchDist;
    zoomState.pinchDist = newDist;
    zoomAt(pt.x, pt.y, factor);
  }
}, { passive: false });

mapEl.addEventListener('touchend', () => { zoomState.isPanning = false; });

mapEl.addEventListener('dblclick', (e) => {
  e.preventDefault();
  const pt = svgPoint(e);
  zoomAt(pt.x, pt.y, 2);
});

document.getElementById('zoomIn').addEventListener('click', () => {
  const cx = zoomState.vbX + zoomState.vbW / 2;
  const cy = zoomState.vbY + zoomState.vbH / 2;
  zoomAt(cx, cy, 1.5);
});

document.getElementById('zoomOut').addEventListener('click', () => {
  const cx = zoomState.vbX + zoomState.vbW / 2;
  const cy = zoomState.vbY + zoomState.vbH / 2;
  zoomAt(cx, cy, 0.67);
});

document.getElementById('zoomReset').addEventListener('click', resetZoom);
</script>
</body>
</html>
