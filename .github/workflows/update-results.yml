name: Update Election Results from CSV

on:
  push:
    branches: [main]
    paths:
      - 'hungary_NA_national_unicameral_constituencies_2026_04.csv'
      - 'hungary_NA_national_unicameral_counties_2026_04.csv'

jobs:
  update-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Import CSV data into results.json
        run: |
          python3 scraper.py \
            --csv hungary_NA_national_unicameral_constituencies_2026_04.csv \
            --csv-county hungary_NA_national_unicameral_counties_2026_04.csv

      - name: Commit and push results.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update results $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
