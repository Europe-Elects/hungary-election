<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hungary 2026 – Capital vs Rest vs Abroad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #F8FAFC; color: #1E293B;
  display: flex; flex-direction: column; overflow: hidden;
}
.container {
  max-width: 960px; margin: 0 auto; padding: 16px 16px 16px; width: 100%;
  flex: 1; display: flex; flex-direction: column; min-height: 0;
}

.header { margin-bottom: 10px; }
.subtitle { font-size: 13px; color: #64748B; }
.last-updated {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; color: #475569; margin-top: 6px;
  padding: 3px 8px; background: #F1F5F9; border-radius: 4px;
}
.last-updated::before {
  content: ''; display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: #64748B;
}
.last-updated.live::before { background: #22C55E; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

#chart-container {
  position: relative; width: 100%;
  background: #fff; border-radius: 8px; border: 1px solid #E2E8F0;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
  flex: 1 1 auto; min-height: 0;
  padding: 14px 16px 10px;
  display: flex; flex-direction: column;
}

.legend-row {
  display: flex; flex-wrap: wrap; gap: 14px;
  font-size: 12px; font-weight: 600; color: #334155;
  margin-bottom: 8px;
}
.legend-row .item { display: flex; align-items: center; gap: 6px; }
.legend-row .swatch { width: 11px; height: 11px; border-radius: 2px; }

.donuts {
  display: flex; gap: 8px; justify-content: space-around;
  align-items: flex-start; flex: 1 1 auto; min-height: 0;
}
.donut-cell {
  display: flex; flex-direction: column; align-items: center;
  flex: 1 1 0;
  /* no min-width so 3 donuts always split the available space evenly,
     even on a 375 px phone — avoids wrapping to two rows */
  min-width: 0;
}
.donut-cell svg {
  width: 100%; max-width: 220px; height: auto; display: block;
}
.donut-label {
  font-size: 13px; font-weight: 700; color: #0F172A;
  margin-top: 4px; text-align: center; line-height: 1.2;
  overflow-wrap: break-word; max-width: 100%;
}
.donut-sub {
  font-size: 10px; color: #64748B; margin-top: 2px; text-align: center;
  font-variant-numeric: tabular-nums;
  line-height: 1.2; overflow-wrap: break-word; max-width: 100%;
}
.donut-sub.awaiting { color: #94A3B8; font-style: italic; }

/* Narrow phones: tighter gap + slightly smaller labels */
@media (max-width: 480px) {
  .donuts { gap: 4px; }
  .donut-label { font-size: 11px; }
  .donut-sub { font-size: 9px; }
  .legend-row { gap: 8px; font-size: 11px; }
}

.donut-slice {
  transition: opacity .15s, filter .15s;
  cursor: pointer;
}
/* When hovering one party across the chart, dim everything else */
#chart-container.has-hover .donut-slice { opacity: 0.18; }
#chart-container.has-hover .donut-slice.party-hover {
  opacity: 1;
  filter: drop-shadow(0 1px 4px rgba(15,23,42,.25));
}
.legend-row .item {
  cursor: pointer; user-select: none;
  padding: 2px 4px; border-radius: 4px;
  transition: background .12s;
}
.legend-row .item:hover { background: #F1F5F9; }
#chart-container.has-hover .legend-row .item { opacity: 0.4; }
#chart-container.has-hover .legend-row .item.party-hover { opacity: 1; }

#bdTooltip {
  position: absolute; pointer-events: none;
  background: #fff; border: 1px solid #E2E8F0; border-radius: 8px;
  padding: 8px 12px; box-shadow: 0 6px 18px rgba(15,23,42,.15);
  font-size: 12px; z-index: 30; min-width: 180px;
  opacity: 0; transform: translateY(4px);
  transition: opacity .12s, transform .12s;
}
#bdTooltip.visible { opacity: 1; transform: translateY(0); }
#bdTooltip h4 {
  font-size: 12px; font-weight: 700; color: #0F172A;
  display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
}
#bdTooltip h4 .swatch { width: 10px; height: 10px; border-radius: 2px; }
#bdTooltip .row {
  display: flex; justify-content: space-between; gap: 12px;
  font-size: 11px; color: #475569; padding: 1px 0;
}
#bdTooltip .row .lbl { color: #64748B; }
#bdTooltip .row .v { font-variant-numeric: tabular-nums; font-weight: 600; color: #0F172A; }
#bdTooltip .row.na .v { color: #94A3B8; font-style: italic; font-weight: 400; }
.donut-center {
  font-size: 13px; font-weight: 700; fill: #0F172A; text-anchor: middle;
  font-variant-numeric: tabular-nums;
}
.donut-center-sub {
  font-size: 9px; fill: #94A3B8; text-anchor: middle;
  text-transform: uppercase; letter-spacing: .04em;
}
.donut-placeholder-ring {
  fill: none; stroke: #E2E8F0; stroke-dasharray: 4 4;
}

.chart-footnote {
  font-size: 10px; color: #64748B; margin-top: 6px; line-height: 1.45;
}
.chart-footnote strong { color: #334155; }

.footer {
  margin-top: 8px; font-size: 11px; color: #64748B; text-align: center;
}

@media (prefers-reduced-motion: reduce) {
  .donut-slice { transition: none; }
  @keyframes pulse { 0%, 100% { opacity: 1; } }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="subtitle">National list vote: Capital vs Rest of the Country vs Voters Abroad</div>
    <div class="last-updated" id="lastUpdated">Last updated: –</div>
  </div>
  <div id="chart-container">
    <div class="legend-row" id="chartLegend"></div>
    <div class="donuts" id="donuts"></div>
    <div id="bdTooltip" role="tooltip"></div>
    <div class="chart-footnote">
      <strong>Voters Abroad</strong> are counted <strong>5–6 days</strong>
      after election day.
    </div>
  </div>
  <div class="footer">Chart created by Andrei Miclea and the EuropeElects team · Source: Hungarian National Election Office VIP Service</div>
</div>

<script>
const PARTIES = {
  'FIDESZ-KDNP': { color: '#000000', name: 'FIDESZ-KDNP (PfE)' },
  'TISZA':       { color: '#3399FF', name: 'TISZA (EPP)' },
  'DK':          { color: '#FF0000', name: 'DK (S&D)' },
  'Mi Hazánk':   { color: '#70463A', name: 'Mi Hazánk (ESN)' },
  'MKKP':        { color: '#009900', name: 'MKKP (→Greens/EFA)' },
};

// Three buckets in a fixed order
const BUCKETS = [
  { key: 'capital',       label: 'Capital',       sub: 'Budapest' },
  { key: 'restOfCountry', label: 'Rest of the Country', sub: '19 counties' },
  { key: 'abroad',        label: 'Voters Abroad', sub: 'mail ballots · counted over days' },
];

function buildLegend() {
  const el = document.getElementById('chartLegend');
  el.innerHTML = Object.entries(PARTIES).map(([key, p]) =>
    `<div class="item" data-party="${key}"><div class="swatch" style="background:${p.color}"></div>${p.name}</div>`
  ).join('');
  // Hover handlers on the legend items
  el.querySelectorAll('.item').forEach(item => {
    item.addEventListener('mouseenter', (e) => highlightParty(item.dataset.party, e));
    item.addEventListener('mousemove', moveTooltip);
    item.addEventListener('mouseleave', clearHighlight);
  });
}

// Cross-donut highlight: any hover on a slice or legend item dims the
// other parties across all 3 donuts and pops the matching slices.
let lastBreakdown = null;

function highlightParty(party, event) {
  const wrap = document.getElementById('chart-container');
  wrap.classList.add('has-hover');
  // Slices
  document.querySelectorAll('.donut-slice').forEach(s => {
    s.classList.toggle('party-hover', s.dataset.party === party);
  });
  // Legend items
  document.querySelectorAll('.legend-row .item').forEach(it => {
    it.classList.toggle('party-hover', it.dataset.party === party);
  });
  showTooltip(party, event);
}

function clearHighlight() {
  const wrap = document.getElementById('chart-container');
  wrap.classList.remove('has-hover');
  document.querySelectorAll('.donut-slice.party-hover').forEach(s => s.classList.remove('party-hover'));
  document.querySelectorAll('.legend-row .item.party-hover').forEach(it => it.classList.remove('party-hover'));
  hideTooltip();
}

function showTooltip(party, event) {
  const tt = document.getElementById('bdTooltip');
  const p = PARTIES[party];
  if (!p) { hideTooltip(); return; }
  let html = `<h4><span class="swatch" style="background:${p.color}"></span>${p.name}</h4>`;
  for (const b of BUCKETS) {
    const data = lastBreakdown && lastBreakdown[b.key];
    const pct = data && typeof data[party] === 'number' ? data[party] : null;
    if (pct === null) {
      html += `<div class="row na"><span class="lbl">${b.label}</span><span class="v">awaiting</span></div>`;
    } else {
      html += `<div class="row"><span class="lbl">${b.label}</span><span class="v">${pct.toFixed(2)}%</span></div>`;
    }
  }
  tt.innerHTML = html;
  tt.classList.add('visible');
  moveTooltip(event);
}

function hideTooltip() {
  document.getElementById('bdTooltip').classList.remove('visible');
}

function moveTooltip(event) {
  const tt = document.getElementById('bdTooltip');
  const wrap = document.getElementById('chart-container');
  const rect = wrap.getBoundingClientRect();
  let left = event.clientX - rect.left + 12;
  let top  = event.clientY - rect.top + 12;
  const ttRect = tt.getBoundingClientRect();
  if (left + ttRect.width > rect.width - 6) left = event.clientX - rect.left - ttRect.width - 12;
  if (top + ttRect.height > rect.height - 6) top = event.clientY - rect.top - ttRect.height - 12;
  if (left < 6) left = 6;
  if (top < 6) top = 6;
  tt.style.left = left + 'px';
  tt.style.top = top + 'px';
}

// Build one donut SVG for a party→pct dict.
// If `data` is null (bucket not yet available) draw an empty dashed ring.
function buildDonutSVG(container, data, labelText, subText) {
  const ns = 'http://www.w3.org/2000/svg';
  const SIZE = 200;
  const cx = SIZE / 2, cy = SIZE / 2;
  const outerR = 82;
  const innerR = 52;

  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', `0 0 ${SIZE} ${SIZE}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

  if (!data || !Object.values(data).some(v => v > 0)) {
    // Placeholder dashed ring
    const ring = document.createElementNS(ns, 'circle');
    ring.setAttribute('cx', cx);
    ring.setAttribute('cy', cy);
    ring.setAttribute('r', (outerR + innerR) / 2);
    ring.setAttribute('class', 'donut-placeholder-ring');
    ring.setAttribute('stroke-width', outerR - innerR);
    svg.appendChild(ring);

    const centerText = document.createElementNS(ns, 'text');
    centerText.setAttribute('x', cx);
    centerText.setAttribute('y', cy + 3);
    centerText.setAttribute('class', 'donut-center-sub');
    centerText.textContent = 'AWAITING COUNT';
    svg.appendChild(centerText);

    container.appendChild(svg);
    const lbl = document.createElement('div');
    lbl.className = 'donut-label';
    lbl.textContent = labelText;
    container.appendChild(lbl);
    const sub = document.createElement('div');
    sub.className = 'donut-sub awaiting';
    sub.textContent = subText;
    container.appendChild(sub);
    return;
  }

  // Sort slices by the fixed PARTIES order so colours are consistent
  const slices = Object.keys(PARTIES)
    .map(p => ({ party: p, pct: data[p] || 0, color: PARTIES[p].color }))
    .filter(s => s.pct > 0);

  // Draw each slice as an SVG arc path (donut ring)
  let startAngle = -Math.PI / 2;  // start at the top
  const total = slices.reduce((sum, s) => sum + s.pct, 0);
  for (const s of slices) {
    const frac = s.pct / total;
    const endAngle = startAngle + frac * Math.PI * 2;
    const largeArc = frac > 0.5 ? 1 : 0;

    const x1o = cx + outerR * Math.cos(startAngle);
    const y1o = cy + outerR * Math.sin(startAngle);
    const x2o = cx + outerR * Math.cos(endAngle);
    const y2o = cy + outerR * Math.sin(endAngle);
    const x1i = cx + innerR * Math.cos(endAngle);
    const y1i = cy + innerR * Math.sin(endAngle);
    const x2i = cx + innerR * Math.cos(startAngle);
    const y2i = cy + innerR * Math.sin(startAngle);

    const d = `M ${x1o} ${y1o}
               A ${outerR} ${outerR} 0 ${largeArc} 1 ${x2o} ${y2o}
               L ${x1i} ${y1i}
               A ${innerR} ${innerR} 0 ${largeArc} 0 ${x2i} ${y2i}
               Z`;

    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', s.color);
    path.setAttribute('class', 'donut-slice');
    path.setAttribute('data-party', s.party);
    path.addEventListener('mouseenter', (e) => highlightParty(s.party, e));
    path.addEventListener('mousemove', moveTooltip);
    path.addEventListener('mouseleave', clearHighlight);
    svg.appendChild(path);

    // Slice label: only draw if the slice is big enough (>6%) to avoid
    // label soup on small slices. Place it at the middle of the arc,
    // halfway between inner and outer radius.
    if (frac > 0.06) {
      const midAngle = (startAngle + endAngle) / 2;
      const midR = (outerR + innerR) / 2;
      const lx = cx + midR * Math.cos(midAngle);
      const ly = cy + midR * Math.sin(midAngle);
      const label = document.createElementNS(ns, 'text');
      label.setAttribute('x', lx);
      label.setAttribute('y', ly + 3);
      label.setAttribute('text-anchor', 'middle');
      label.setAttribute('font-size', '10');
      label.setAttribute('font-weight', '700');
      label.setAttribute('fill', isLightFill(s.color) ? '#0F172A' : '#ffffff');
      label.setAttribute('pointer-events', 'none');
      label.textContent = s.pct.toFixed(1) + '%';
      svg.appendChild(label);
    }

    startAngle = endAngle;
  }

  container.appendChild(svg);
  const lbl = document.createElement('div');
  lbl.className = 'donut-label';
  lbl.textContent = labelText;
  container.appendChild(lbl);
  const sub = document.createElement('div');
  sub.className = 'donut-sub';
  sub.textContent = subText;
  container.appendChild(sub);
}

// Black / brown / green = dark; blue / red depend on brightness
function isLightFill(hex) {
  const h = hex.replace('#', '');
  const r = parseInt(h.slice(0, 2), 16);
  const g = parseInt(h.slice(2, 4), 16);
  const b = parseInt(h.slice(4, 6), 16);
  const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  return lum > 0.6;
}

function renderChart(data) {
  const wrap = document.getElementById('donuts');
  wrap.innerHTML = '';
  const breakdown = (data && data.nationalBreakdown) || {};
  for (const b of BUCKETS) {
    const cell = document.createElement('div');
    cell.className = 'donut-cell';
    buildDonutSVG(cell, breakdown[b.key], b.label, b.sub);
    wrap.appendChild(cell);
  }
}

function applyResults(data) {
  const el = document.getElementById('lastUpdated');
  el.textContent = 'Last updated: ' + new Date(data.lastUpdated).toLocaleString('en-GB', {dateStyle:'medium',timeStyle:'medium'});
  const breakdown = data.nationalBreakdown || {};
  lastBreakdown = breakdown;
  const hasAny = Object.values(breakdown).some(b => b && Object.values(b).some(v => v > 0));
  el.classList.toggle('live', hasAny);
  renderChart(data);
}

async function loadResults() {
  try {
    const data = await (await fetch('results.json?' + Date.now())).json();
    applyResults(data);
  } catch (e) {
    renderChart(null);
  }
}

setInterval(async () => {
  try {
    const data = await (await fetch('results.json?' + Date.now())).json();
    applyResults(data);
  } catch (e) {}
}, 30000);

buildLegend();
loadResults();
</script>
</body>
</html>
